<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .result-box {
            font-size: 1.4em;
            font-weight: bold;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        /* Your new CSS classes */
        .approved {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .rejected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .probability {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #7f8c8d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Prediction Result</h2>
        
        {% if prediction == "APPROVED" %}
            <div class="result-box approved">
                Congratulations! Your Loan is Approved.
            </div>
        {% else %}
            <div class="result-box rejected">
                Sorry, Your Loan Application is Rejected.
            </div>
        {% endif %}

        <!-- Displaying the model's confidence score -->
        <div class="probability">
            Model Confidence: <strong>{{ probability }}%</strong>
        </div>

        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
